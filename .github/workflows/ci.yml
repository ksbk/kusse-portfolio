name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run quality gate
        run: make quality
        env:
          SECRET_KEY: ci-secret-key-not-used-in-production
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
