<section class="section contact-cta"{% if contact_cta.id %} id="{{ contact_cta.id }}"{% endif %}>
    <div class="container contact-cta__inner">
        <div>
            <p class="eyebrow">{{ contact_cta.eyebrow }}</p>
            <h2>{{ contact_cta.title }}</h2>
            <p>{{ contact_cta.description }}</p>
        </div>

        {% if contact_cta.action_url and contact_cta.action_label %}
            <a class="button button--primary" href="{{ contact_cta.action_url }}">
                {{ contact_cta.action_label }}
            </a>
        {% endif %}
    </div>
</section>
