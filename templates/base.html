{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>{% block title %}{{ site.name }}{% endblock %}</title>
        <meta name="description" content="{% block meta_description %}{{ site.description }}{% endblock %}">
        <meta property="og:title" content="{% block og_title %}{{ site.name }}{% endblock %}">
        <meta property="og:description" content="{% block og_description %}{{ site.description }}{% endblock %}">
        <meta property="og:type" content="website">
        <meta property="og:url" content="{{ request.build_absolute_uri }}">

        <link rel="stylesheet" href="{% static 'css/main.css' %}">
        <script>document.documentElement.classList.add("js");</script>
        <script src="{% static 'js/main.js' %}" defer></script>
    </head>
    <body>
        <!-- Essential keyboard accessibility escape hatch -->
        <a href="#main-content" class="skip-link">Skip to main content</a>

        <header class="site-header">
            <div class="container site-header__inner">
                <a href="{{ home_url }}" class="site-brand" aria-label="{{ site.name }} home">{{ site.name }}</a>

                <button class="site-nav-toggle" type="button" aria-expanded="false" aria-controls="primary-navigation">
                    <span class="site-nav-toggle__bar"></span>
                    <span class="site-nav-toggle__bar"></span>
                    <span class="site-nav-toggle__bar"></span>
                    <span class="visually-hidden">Menu</span>
                </button>

                <nav class="site-nav" id="primary-navigation" aria-label="Primary navigation">
                    <ul class="site-nav__list">
                        {% for item in main_nav %}
                            <li><a href="{{ item.url }}"{% if item.is_active %} aria-current="page"{% endif %}>{{ item.label }}</a></li>
                        {% endfor %}
                    </ul>
                </nav>
            </div>
        </header>

        <!-- Main landmark wrapper with focus-target capability -->
        <main id="main-content" class="site-main" tabindex="-1">
            {% block content %}{% endblock %}
        </main>

        {% include "includes/footer.html" %}
    </body>
</html>
